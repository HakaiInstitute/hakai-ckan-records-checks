name: Hakai CKAN Record Checks

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.CI_TOKEN }}
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run Hakai CKAN Record Checks
        run: uv run hakai_ckan_records_checks -c https://catalogue.hakai.org --no-cache

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9
        with:
          commit_message: "Update records [skip ci]"

      - name: Build site with mkdocs
        run: uv run mkdocs build --site-dir site

      - name: Upload Page artifacts
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    needs: build
    permissions:
      pages: write     
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
